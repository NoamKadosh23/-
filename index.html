<!-- [עברית] זהו קובץ ה-HTML הראשי, השלד של האתר שלנו. -->
<!DOCTYPE html>
<!-- [עברית] הגדרת השפה כעברית (he) וכיוון הכתיבה מימין לשמאל (rtl). -->
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payslip Analyzer Bot</title>
    
    <!-- [עברית] טעינת Tailwind CSS, ספריית עיצוב שעוזרת לנו לעצב את האתר במהירות ובקלות באמצעות קלאסים מוכנים מראש. -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- [עברית] טעינת פונט 'Rubik' מגוגל פונטים, כדי להבטיח שהטקסט באתר ייראה יפה ועקבי. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- [עברית] הגדרת סגנון CSS בסיסי כדי להחיל את פונט 'Rubik' על כל הטקסט באתר. -->
    <style>
      body {
        font-family: 'Rubik', sans-serif;
      }
    </style>

    <!-- [עברית] Import Map: זהו מנגנון מודרני בדפדפן שמאפשר לנו להשתמש בשמות מקוצרים (כמו 'react') במקום בכתובות URL ארוכות.
         כך, כשאנחנו כותבים import React from 'react' בקוד, הדפדפן יודע מאיפה להביא את הקובץ המתאים. -->
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.21.0",
    "pdfjs-dist": "https://unpkg.com/pdfjs-dist@4.4.168/build/pdf.min.mjs"
  }
}
</script>
</head>
  <body class="bg-gray-50 text-gray-800">
    <!-- [עברית] זהו האלמנט המרכזי שבו ריאקט "תשתול" את כל האפליקציה שלנו. הוא כמו עציץ ריק שמחכה לפרח. -->
    <div id="root"></div>
    
    <!-- [עברית] טעינת קובץ ה-JavaScript הראשי (index.tsx) שמפעיל את כל לוגיקת האפליקציה.
         'type="module"' מאפשר לנו להשתמש בתחביר ייבוא וייצוא מודרני בקוד שלנו. -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
